[build]
target = "xtensa-esp32-espidf"

[target.xtensa-esp32-espidf]
linker = "ldproxy"
runner = "qemu-esp-xtensa -machine esp32 -drive if=mtd,format=raw,file="
rustflags = ["--cfg", "espidf_time64"]

[unstable]
build-std = ["std", "panic_abort"]

[env]
ESP_IDF_VERSION = "v5.3.2"
ESP_IDF_SYS_ROOT_CRATE = "emulator"
